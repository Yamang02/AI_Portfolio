# 로컬 SonarQube 기본 (SQ-01). SonarCloud 사용 시 아래 URL만 교체.
# Quality Profile: SonarQube UI에서 이 프로젝트에 언어별 내장 Sonar way 적용 (vibe_boilerplate E06 P02·sonar-profiles README).
sonar.host.url=http://localhost:9000

# SonarCloud 예시 (의도적 전환 시):
# sonar.host.url=https://sonarcloud.io
# sonar.organization=...

sonar.projectKey=AI_Portfolio_backend_local

# sonar.login=${env.SONAR_TOKEN}

# Source/Test paths
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

sonar.sourceEncoding=UTF-8
sonar.exclusions=**/generated/**,**/config/**,**/*Dto*.java
