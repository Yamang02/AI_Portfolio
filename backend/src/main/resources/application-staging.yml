server:
  port: ${PORT}  # Cloud Run dynamic port

spring:
  application:
    name: ai-portfolio-backend

  # DB is configured by split env vars:
  # GCP_CLOUD_SQL_INSTANCE_CONNECTION_NAME, POSTGRES_DATABASE, POSTGRES_USER, POSTGRES_PASSWORD

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Staging schema baseline - existing tables"
    validate-on-migrate: false
    clean-disabled: true
    ignore-missing-migrations: false
    user: ${FLYWAY_USER}
    password: ${FLYWAY_PASSWORD}

  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      ssl:
        enabled: ${REDIS_SSL}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 86400000

  session:
    store-type: redis
    redis:
      namespace: spring:session
      flush-mode: on_save
    timeout: 1800s

  web:
    cors:
      allowed-origins:
        - "https://staging.admin.yamang02.com"
        - "https://staging.portfolio.yamang02.com"
        - "https://ai-portfolio-staging-493721639129.asia-northeast3.run.app"
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers: "*"
      allow-credentials: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: true

logging:
  level:
    com.aiportfolio.backend: INFO
    com.aiportfolio.backend.infrastructure.persistence.redis: DEBUG
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.springframework.data.redis: INFO
    org.springframework.boot.autoconfigure: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"

app:
  gemini:
    api-key: ${GEMINI_API_KEY}
    model-name: gemini-2.5-flash
  github:
    username: Yamang02
  contact:
    email: contact@yamangsolution.com
  security:
    rate-limit:
      window: 60000
      max-requests: 50
  session:
    cookie:
      secure: true
      sameSite: None
      use-domain: false
      # domain: staging.yamang02.com

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

cloud:
  aws:
    access-key: ${AWS_ACCESS_KEY_ID:${AWS_ACCESS_KEY:}}
    secret-key: ${AWS_SECRET_ACCESS_KEY:${AWS_SECRET_KEY:}}
    region: ${AWS_REGION:us-east-1}
  gcp:
    project-id: ${GCP_PROJECT_ID:yamang02-ai-portfolio}
    billing-dataset: ${GCP_BILLING_DATASET:billing_export}
    billing-table: ${GCP_BILLING_TABLE:gcp_billing_export_v1_012659_03CA1D_2D9F35}
    credentials-path: ${GCP_CREDENTIALS_PATH:}