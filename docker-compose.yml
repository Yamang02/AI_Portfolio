# AI Portfolio 로컬 개발환경
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-portfolio-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d ai_portfolio"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-portfolio-network

  # Redis for Caching
  redis:
    image: redis:7-alpine
    container_name: ai-portfolio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai-portfolio-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai-portfolio-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/src:/app/src
      - ./backend/pom.xml:/app/pom.xml
      - maven_cache:/root/.m2  # Maven 의존성 캐시
      - ./backend/target:/app/target  # 빌드 결과물 캐시
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - ai-portfolio-network

  # React Frontend (로컬 개발용 - Docker 제외)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile.dev
  #   container_name: ai-portfolio-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - VITE_API_BASE_URL=http://localhost:8080
  #     - VITE_AI_API_BASE_URL=http://localhost:8001
  #   volumes:
  #     - ./frontend/src:/app/src
  #     - ./frontend/public:/app/public
  #     - ./frontend/package.json:/app/package.json
  #     - ./frontend/vite.config.ts:/app/vite.config.ts
  #     - ./frontend/index.html:/app/index.html
  #     - ./frontend/postcss.config.js:/app/postcss.config.js
  #     - ./frontend/tailwind.config.js:/app/tailwind.config.js
  #     - ./frontend/package-lock.json:/app/package-lock.json
  #     - /app/node_modules
  #   depends_on:
  #     - backend
  #   restart: unless-stopped
  #   networks:
  #     - ai-portfolio-network

  # 백엔드 SonarQube 분석 — 로컬에 Maven 없이 재현할 때 사용. `profiles: sonar` 로 일반 `compose up`에는 안 뜸.
  # 전제: 호스트에서 SonarQube :9000 가동, 레포 루트 .env에 SONAR_TOKEN.
  # 실행: docker compose --profile sonar run --rm backend-sonar  (레포 루트에서)
  backend-sonar:
    profiles: ["sonar"]
    image: maven:3.9-eclipse-temurin-17
    container_name: ai-portfolio-backend-sonar
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    environment:
      SONAR_TOKEN: ${SONAR_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mvn -q -DskipTests compile org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
        -Dsonar.projectKey=AI_Portfolio_backend_local
        -Dsonar.host.url=http://host.docker.internal:9000
        -Dsonar.token=$${SONAR_TOKEN}

  # pgAdmin (선택사항 - 필요시에만 실행)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai-portfolio-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    profiles:
      - admin
    networks:
      - ai-portfolio-network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  maven_cache:  # Maven 의존성 캐시용

networks:
  ai-portfolio-network:
    driver: bridge