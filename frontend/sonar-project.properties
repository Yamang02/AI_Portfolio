# 로컬 SonarQube 기본 (SQ-01). SonarCloud 사용 시 아래 URL만 교체.
# Quality Profile: SonarQube UI에서 이 프로젝트에 언어별 내장 Sonar way 적용 (vibe_boilerplate E06 P02·sonar-profiles README).
sonar.host.url=http://localhost:9000

# SonarCloud 예시 (의도적 전환 시):
# sonar.host.url=https://sonarcloud.io
# sonar.organization=...
# sonar.projectKey=...

# 로컬 Sonar 프로젝트 키(요약·이슈 JSON과 동일). CI에서 다르면 -D로 덮어쓴다.
sonar.projectKey=AI_Portfolio_frontend_local

# 토큰은 커밋하지 말고 환경 변수 사용 권장.
# sonar.login=${env.SONAR_TOKEN}

# Source/Test paths — 동일 트리에서 테스트만 분리(중복 인덱싱 방지)
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage (npm run test:coverage → Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# File exclusions (테스트 파일은 소스 분석에서 제외 → test.inclusions와만 겹침)
sonar.exclusions=dist/**,node_modules/**,coverage/**,storybook-static/**,**/*.stories.ts,**/*.stories.tsx,**/*.stories.js,**/*.stories.jsx,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.sourceEncoding=UTF-8
